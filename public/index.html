<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnonChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-content-1">
            <h1>AnonChat</h1>
        </div>

        <div class="navbar-content-2">
            <div class="online-ico"></div>
            <div>
                <span id="online-count">0 online</span>
            </div>
        </div>
    </div>

    <div class="text-example" id="log"></div>

    <div class="mention-list" id="mention-list"></div>

    <div class="text-content">
        <input id="msg-input" type="text" maxlength="300" autocomplete="off" placeholder="send a message as username">
        <button id="send-btn">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
